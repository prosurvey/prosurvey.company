name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Quality checks
        run: npm run check
      - name: Build
        run: npm run build
